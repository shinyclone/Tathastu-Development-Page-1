<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — Tathastu Farms</title>
<link rel="icon" type="image/png" href="https://i.ibb.co/3YQg64ty/Screenshot-2026-02-28-004338-removebg-preview.png">

<!-- ── Preload ALL gallery images immediately ── -->
<!-- Desktop images preloaded on wide screens only -->
<link rel="preload" as="image" href="gallery-desktop-1.jpg" media="(min-width: 769px)" fetchpriority="high">
<link rel="preload" as="image" href="gallery-desktop-2.jpg" media="(min-width: 769px)">
<link rel="preload" as="image" href="gallery-desktop-3.jpg" media="(min-width: 769px)">
<!-- Mobile images preloaded on narrow screens only -->
<link rel="preload" as="image" href="gallery-mobile-1.jpg" media="(max-width: 768px)" fetchpriority="high">
<link rel="preload" as="image" href="gallery-mobile-2.jpg" media="(max-width: 768px)">
<link rel="preload" as="image" href="gallery-mobile-3.jpg" media="(max-width: 768px)">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold:       #b89a5e;
    --gold-light: #d4b87a;
    --beige:      #f0ebe0;
    --nav-bg:     rgba(10, 8, 5, 0.70);
    --nav-border: rgba(184, 154, 94, 0.14);
    --trans:      0.65s;   /* cross-fade speed — fast but buttery */
    --auto-ms:    5000ms;  /* auto-advance every 5s */
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #080604;   /* dark base shows while images load */
  }

  body {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    color: var(--beige);
  }

  /* ════════════════════════════════════════
     SLIDESHOW STACK
     All slides sit on top of each other.
     Cross-fade is achieved with opacity only
     (GPU composited — zero layout/paint).
  ════════════════════════════════════════ */

  .slideshow {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: #080604;
  }

  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    /* GPU-only transition — no layout, no paint */
    transition: opacity var(--trans) ease;
    will-change: opacity;
  }

  .slide.active {
    opacity: 1;
    z-index: 1;
  }

  /* Cinematic zoom only on active slide */
  .slide.active .slide-img {
    animation: zoomIn 7s ease-in-out forwards;
  }

  @keyframes zoomIn {
    from { transform: scale(1.00); }
    to   { transform: scale(1.06); }
  }

  .slide-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
    /* Promotes image to its own layer for instant paint */
    will-change: transform;
    /* Hint browser to decode image off main thread */
    content-visibility: auto;
  }

  /* Dark vignette (CSS-only, never blocks images) */
  .slide::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background:
      linear-gradient(180deg,
        rgba(5,3,1,0.52) 0%,
        rgba(5,3,1,0.12) 28%,
        rgba(5,3,1,0.12) 72%,
        rgba(5,3,1,0.58) 100%
      ),
      radial-gradient(ellipse at 50% 50%, transparent 38%, rgba(5,3,1,0.40) 100%);
  }

  /* ════════════════════════════════════════
     GLASS NAV BAR — visible immediately,
     no animation delay
  ════════════════════════════════════════ */

  .nav-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 clamp(16px, 4vw, 40px);
    height: clamp(54px, 8vh, 68px);
    background: var(--nav-bg);
    border-bottom: 1px solid var(--nav-border);
    backdrop-filter: blur(18px) saturate(130%);
    -webkit-backdrop-filter: blur(18px) saturate(130%);
  }

  .nav-back {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: var(--gold-light);
    font-size: clamp(0.58rem, 1.1vw, 0.68rem);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 300;
    transition: color 0.25s ease;
    flex: 1;
  }

  .nav-back svg {
    width: 13px; height: 13px;
    stroke: currentColor; fill: none;
    stroke-width: 1.6;
    stroke-linecap: round; stroke-linejoin: round;
    transition: transform 0.25s ease;
    flex-shrink: 0;
  }

  .nav-back:hover { color: var(--beige); }
  .nav-back:hover svg { transform: translateX(-3px); }

  .nav-logo {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }

  .nav-logo img {
    height: clamp(26px, 4vh, 40px);
    width: auto;
    display: block;
    filter: drop-shadow(0 1px 6px rgba(184,154,94,0.22));
  }

  .nav-counter {
    flex: 1;
    text-align: right;
    font-size: clamp(0.56rem, 1vw, 0.64rem);
    letter-spacing: 0.16em;
    color: rgba(184,154,94,0.50);
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
  }

  /* ════════════════════════════════════════
     ARROW BUTTONS
  ════════════════════════════════════════ */

  .arrow {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    z-index: 90;
    width: clamp(38px, 5vw, 52px);
    height: clamp(38px, 5vw, 52px);
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(8, 6, 3, 0.42);
    border: 1px solid rgba(184,154,94,0.20);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    cursor: pointer;
    transition: background 0.3s ease, border-color 0.3s ease, transform 0.3s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .arrow:hover {
    background: rgba(184,154,94,0.13);
    border-color: rgba(184,154,94,0.48);
    transform: translateY(-50%) scale(1.07);
  }

  .arrow-prev { left: clamp(10px, 2.5vw, 26px); }
  .arrow-next { right: clamp(10px, 2.5vw, 26px); }

  .arrow svg {
    width: 15px; height: 15px;
    stroke: var(--gold-light); fill: none;
    stroke-width: 1.6;
    stroke-linecap: round; stroke-linejoin: round;
    transition: stroke 0.25s ease;
  }

  .arrow:hover svg { stroke: var(--beige); }

  /* ════════════════════════════════════════
     DOT INDICATORS
  ════════════════════════════════════════ */

  .dots {
    position: fixed;
    bottom: clamp(18px, 3.5vh, 32px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 90;
    display: flex;
    gap: 9px;
    align-items: center;
  }

  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(184,154,94,0.30);
    border: 1px solid rgba(184,154,94,0.38);
    cursor: pointer;
    transition: background 0.35s ease, width 0.35s ease, border-radius 0.35s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .dot.active {
    background: var(--gold-light);
    width: 20px;
    border-radius: 3px;
  }

  /* ════════════════════════════════════════
     CAPTION
  ════════════════════════════════════════ */

  .slide-caption {
    position: fixed;
    bottom: clamp(52px, 7.5vh, 68px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 90;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.68rem, 1.4vw, 0.86rem);
    font-weight: 300;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: rgba(240,235,224,0.42);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }

  .slide-caption.visible { opacity: 1; }

  /* ════════════════════════════════════════
     PROGRESS BAR
  ════════════════════════════════════════ */

  .progress-bar {
    position: fixed;
    bottom: 0; left: 0;
    height: 2px;
    width: 0%;
    background: linear-gradient(90deg, rgba(184,154,94,0.25), var(--gold-light));
    z-index: 91;
  }

  .progress-bar.running {
    transition: width var(--auto-ms) linear;
    width: 100%;
  }
</style>
</head>
<body>

<!-- Slideshow -->
<div class="slideshow" id="slideshow">

  <div class="slide active">
    <picture>
      <source media="(max-width: 768px)" srcset="gallery-mobile-1.jpg">
      <img class="slide-img" src="gallery-desktop-1.jpg"
           alt="Tathastu Farms — Gallery 1"
           fetchpriority="high"
           decoding="sync">
    </picture>
  </div>

  <div class="slide">
    <picture>
      <source media="(max-width: 768px)" srcset="gallery-mobile-2.jpg">
      <img class="slide-img" src="gallery-desktop-2.jpg"
           alt="Tathastu Farms — Gallery 2"
           fetchpriority="high"
           decoding="async">
    </picture>
  </div>

  <div class="slide">
    <picture>
      <source media="(max-width: 768px)" srcset="gallery-mobile-3.jpg">
      <img class="slide-img" src="gallery-desktop-3.jpg"
           alt="Tathastu Farms — Gallery 3"
           fetchpriority="high"
           decoding="async">
    </picture>
  </div>

</div>

<!-- Nav bar -->
<nav class="nav-bar">
  <a href="index.html" class="nav-back" aria-label="Back to Home">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    <span>Home</span>
  </a>
  <div class="nav-logo">
    <img src="logo.svg" alt="Tathastu Farms">
  </div>
  <div class="nav-counter">
    <span id="slide-current">1</span> / <span id="slide-total">3</span>
  </div>
</nav>

<!-- Arrows -->
<button class="arrow arrow-prev" id="prev" aria-label="Previous image">
  <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
</button>
<button class="arrow arrow-next" id="next" aria-label="Next image">
  <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
</button>

<!-- Dots -->
<div class="dots" id="dots" role="tablist"></div>

<!-- Caption -->
<div class="slide-caption" id="caption"></div>

<!-- Progress bar -->
<div class="progress-bar" id="progress"></div>

<script>
(function () {
  'use strict';

  const slides   = Array.from(document.querySelectorAll('.slide'));
  const dotsEl   = document.getElementById('dots');
  const capEl    = document.getElementById('caption');
  const progEl   = document.getElementById('progress');
  const curEl    = document.getElementById('slide-current');
  const totalEl  = document.getElementById('slide-total');

  const TOTAL    = slides.length;
  const AUTO_MS  = 5000;
  const TRANS_MS = 650;   /* matches CSS --trans */

  const CAPTIONS = ['Luxury Stay', 'Fine Dining', 'Unforgettable Experiences'];

  let cur         = 0;
  let timer       = null;
  let busy        = false;
  const isMobile  = () => window.matchMedia('(max-width: 768px)').matches;

  // ── Build dots ──────────────────────────────────
  totalEl.textContent = TOTAL;
  slides.forEach((_, i) => {
    const d = document.createElement('button');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.setAttribute('aria-label', 'Slide ' + (i + 1));
    d.addEventListener('click', () => goTo(i));
    dotsEl.appendChild(d);
  });
  const dots = Array.from(dotsEl.querySelectorAll('.dot'));

  // ── Eagerly decode + preload all images now ──────
  // All <link rel="preload"> in <head> already kick off network requests.
  // Additionally force decode off main thread for instant paint.
  slides.forEach(slide => {
    const img = slide.querySelector('img');
    if (img && img.decode) img.decode().catch(() => {});
  });

  // ── Caption helper ────────────────────────────────
  function showCaption(i) {
    capEl.classList.remove('visible');
    setTimeout(() => {
      capEl.textContent = CAPTIONS[i] || '';
      capEl.classList.add('visible');
    }, 300);
  }

  // ── Core transition ───────────────────────────────
  function goTo(index) {
    if (busy || index === cur) return;
    busy = true;

    const prev = cur;
    cur = ((index % TOTAL) + TOTAL) % TOTAL;

    // Swap active class — CSS handles opacity cross-fade
    slides[prev].classList.remove('active');
    dots[prev].classList.remove('active');

    // Reset zoom on outgoing slide
    const outImg = slides[prev].querySelector('.slide-img');
    if (outImg) { outImg.style.animation = 'none'; void outImg.offsetWidth; }

    slides[cur].classList.add('active');
    dots[cur].classList.add('active');
    curEl.textContent = cur + 1;

    // Restart zoom on incoming slide
    const inImg = slides[cur].querySelector('.slide-img');
    if (inImg) { inImg.style.animation = 'none'; void inImg.offsetWidth; inImg.style.animation = ''; }

    showCaption(cur);

    setTimeout(() => { busy = false; }, TRANS_MS);
    resetTimer();
  }

  function advance() { goTo(cur + 1); }

  // ── Progress bar + auto-advance ───────────────────
  function resetTimer() {
    clearInterval(timer);

    progEl.classList.remove('running');
    progEl.style.transition = 'none';
    progEl.style.width = '0%';
    void progEl.offsetWidth;                 // flush
    progEl.classList.add('running');

    timer = setInterval(advance, AUTO_MS);
  }

  // ── Pause on hover ────────────────────────────────
  const ss = document.getElementById('slideshow');
  ss.addEventListener('mouseenter', () => {
    clearInterval(timer);
    progEl.classList.remove('running');
  });
  ss.addEventListener('mouseleave', resetTimer);

  // ── Arrow buttons ─────────────────────────────────
  document.getElementById('prev').addEventListener('click', () => goTo(cur - 1));
  document.getElementById('next').addEventListener('click', () => goTo(cur + 1));

  // ── Keyboard ──────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  goTo(cur - 1);
    if (e.key === 'ArrowRight') goTo(cur + 1);
  });

  // ── Touch swipe ───────────────────────────────────
  let tx = 0, ty = 0;
  document.addEventListener('touchstart', e => {
    tx = e.changedTouches[0].clientX;
    ty = e.changedTouches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 42) {
      dx < 0 ? goTo(cur + 1) : goTo(cur - 1);
    }
  }, { passive: true });

  // ── Start ─────────────────────────────────────────
  showCaption(0);
  resetTimer();

})();
</script>
</body>
</html>
